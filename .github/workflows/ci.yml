name: CI Pipeline Spring Angular

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3


      - name: Build Angular Image
        run: |
          docker build -t angular-app ./angular-app


      - name: Build Spring Boot Image
        run: |
          docker build -t spring-app ./springboot


      - name: Run Docker Compose
        run: |
          docker compose up -d


      - name: Wait containers
        run: sleep 20


      - name: Show containers
        run: docker ps
